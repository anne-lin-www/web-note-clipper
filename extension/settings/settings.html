<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="settings.css">
  <title>Web Note Clipper 設定</title>
</head>
<body>
  <div class="app">
    <header class="app-header">
      <span class="logo">
        <!-- file-pen-line -->
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="m18 5-2.414-2.414A2 2 0 0 0 14.172 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2"/>
          <path d="M21.378 12.626a1 1 0 0 0-3.004-3.004l-4.01 4.012a2 2 0 0 0-.506.854l-.837 2.87a.5.5 0 0 0 .62.62l2.87-.837a2 2 0 0 0 .854-.506z"/>
          <path d="M8 18h1"/>
        </svg>
      </span>
      <h1>Web Note Clipper 設定</h1>
    </header>
    <main class="form-body">
      <div class="field">
        <label for="inputApiUrl">API 網址</label>
        <input type="url" id="inputApiUrl" placeholder="http://localhost:8765">
      </div>
      <div class="field">
        <label for="selectVault">使用中的 Vault</label>
        <select id="selectVault"></select>
      </div>
      <div class="field">
        <button id="btnTest" class="btn">
          <!-- zap -->
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M4 14a1 1 0 0 1-.78-1.63l9.9-10.2a.5.5 0 0 1 .86.46l-1.92 6.02A1 1 0 0 0 13 10h7a1 1 0 0 1 .78 1.63l-9.9 10.2a.5.5 0 0 1-.86-.46l1.92-6.02A1 1 0 0 0 11 14z"/>
          </svg>
          測試連線
        </button>
        <div id="testResult" class="test-result hidden"></div>
      </div>
    </main>
    <footer class="app-footer">
      <button id="btnSave" class="btn btn-primary">
        <!-- save -->
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M15.2 3a2 2 0 0 1 1.4.6l3.8 3.8a2 2 0 0 1 .6 1.4V19a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2z"/>
          <path d="M17 21v-7a1 1 0 0 0-1-1H8a1 1 0 0 0-1 1v7"/>
          <path d="M7 3v4a1 1 0 0 0 1 1h7"/>
        </svg>
        儲存設定
      </button>
    </footer>
  </div>
  <script src="settings.js"></script>
</body>
</html>
