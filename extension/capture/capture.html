<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="capture.css">
  <title>儲存網頁筆記</title>
</head>
<body>
  <div class="app">
    <header class="app-header">
      <span class="logo">
        <!-- file-pen-line -->
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="m18 5-2.414-2.414A2 2 0 0 0 14.172 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2"/>
          <path d="M21.378 12.626a1 1 0 0 0-3.004-3.004l-4.01 4.012a2 2 0 0 0-.506.854l-.837 2.87a.5.5 0 0 0 .62.62l2.87-.837a2 2 0 0 0 .854-.506z"/>
          <path d="M8 18h1"/>
        </svg>
      </span>
      <h1>儲存網頁筆記</h1>
      <button id="btnClose" class="btn-icon" title="關閉">
        <!-- x -->
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M18 6 6 18"/><path d="m6 6 12 12"/>
        </svg>
      </button>
    </header>

    <main class="form-body">

      <!-- 左欄：截圖 -->
      <aside class="panel-left">
        <div class="field">
          <label>截圖預覽</label>
          <div class="screenshot-preview">
            <img id="screenshotImg" src="" alt="截圖預覽">
            <div id="screenshotPlaceholder" class="placeholder">（尚無截圖）</div>
          </div>
          <div class="screenshot-actions">
            <button id="btnRetake" class="btn btn-sm">
              <!-- camera -->
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/>
                <circle cx="12" cy="13" r="3"/>
              </svg>
              重新截圖
            </button>
            <button id="btnCrop" class="btn btn-sm">
              <!-- crop -->
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M6 2v14a2 2 0 0 0 2 2h14"/>
                <path d="M18 22V8a2 2 0 0 0-2-2H2"/>
              </svg>
              裁切
            </button>
          </div>
        </div>
      </aside>

      <!-- 右欄：表單欄位 -->
      <section class="panel-right">
        <div class="field">
          <label for="inputUrl">來源網址</label>
          <input type="url" id="inputUrl" placeholder="https://example.com">
        </div>
        <div class="field">
          <label for="inputTitle">筆記標題</label>
          <input type="text" id="inputTitle" placeholder="頁面標題">
        </div>
        <div class="field">
          <label for="inputParagraph">重要段落</label>
          <textarea id="inputParagraph" rows="5" placeholder="自動填入已選取的文字…"></textarea>
        </div>
        <div class="field">
          <label for="inputNotes">個人筆記</label>
          <textarea id="inputNotes" rows="4" placeholder="你的想法或備注…"></textarea>
        </div>
        <div class="field">
          <label for="selectFolder">儲存到資料夾</label>
          <div class="folder-row">
            <select id="selectFolder"></select>
            <button id="btnAddFolder" class="btn btn-sm">
              <!-- folder-plus -->
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M12 10v6"/><path d="M9 13h6"/>
                <path d="M20 20a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.9a2 2 0 0 0-1.69.9L9.6 8.9A2 2 0 0 1 7.93 9.8H4a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2z"/>
              </svg>
              新增資料夾
            </button>
          </div>
          <div id="newFolderRow" class="new-folder-row hidden">
            <input type="text" id="inputNewFolder" placeholder="法規/新子資料夾">
            <button id="btnConfirmFolder" class="btn btn-sm btn-primary">
              <!-- check -->
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M20 6 9 17l-5-5"/>
              </svg>
              確認
            </button>
            <button id="btnCancelFolder" class="btn btn-sm">取消</button>
          </div>
        </div>
        <div class="field">
          <label>標籤</label>
          <div id="tagsContainer" class="tags-container"></div>
          <div class="tag-input-row">
            <div class="tag-autocomplete">
              <input type="text" id="inputTag" placeholder="輸入或選擇標籤" autocomplete="off">
              <ul id="tagDropdown" class="tag-dropdown hidden"></ul>
            </div>
          </div>
        </div>
        <div class="field">
          <label>儲存日期</label>
          <input type="text" id="inputDate" readonly>
        </div>
      </section>

    </main>

    <footer class="app-footer">
      <div class="api-status">
        <span id="footerDot" class="dot dot-unknown"></span>
        <span id="footerStatus">檢查連線中…</span>
      </div>
      <div class="footer-actions">
        <button id="btnCancel" class="btn">取消</button>
        <button id="btnSave" class="btn btn-primary">
          <!-- save -->
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M15.2 3a2 2 0 0 1 1.4.6l3.8 3.8a2 2 0 0 1 .6 1.4V19a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2z"/>
            <path d="M17 21v-7a1 1 0 0 0-1-1H8a1 1 0 0 0-1 1v7"/>
            <path d="M7 3v4a1 1 0 0 0 1 1h7"/>
          </svg>
          儲存筆記
        </button>
      </div>
    </footer>

    <div id="toast" class="toast hidden"></div>

    <!-- 重複筆記提示 -->
    <div id="conflictModal" class="modal-overlay hidden">
      <div class="modal-box">
        <p class="modal-title">
          <!-- triangle-alert -->
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3"/>
            <path d="M12 9v4"/><path d="M12 17h.01"/>
          </svg>
          已有相同頁面的筆記
        </p>
        <p id="conflictFilename" class="modal-filename"></p>
        <div class="modal-actions">
          <button id="btnOverwrite" class="btn btn-danger">覆蓋原有筆記</button>
          <button id="btnNewVersion" class="btn btn-primary">另存為新版本</button>
          <button id="btnConflictCancel" class="btn">取消</button>
        </div>
      </div>
    </div>
  </div>
  <script src="capture.js"></script>
</body>
</html>
